<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Gallery</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(135deg, #070b1d 0%, #0f1632 45%, #05060f 100%);
      color: #f3f6ff;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .gallery-shell {
      width: min(92vw, 1200px);
      aspect-ratio: 16 / 9;
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.14);
      background: #02050d;
    }

    .image,
    .image-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 1.2s ease, transform 1.2s ease, filter 1.2s ease;
      opacity: 0;
      transform: scale(1.04);
      will-change: transform, opacity;
    }

    .image.active {
      opacity: 1;
      transform: scale(1);
    }

    .image-overlay {
      filter: blur(1.5px) saturate(1.2) brightness(1.15);
      mix-blend-mode: screen;
      opacity: 0.7;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(5,10,26,0.65), rgba(5,10,26,0.12) 40%, rgba(255,255,255,0.16));
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 24px;
      bottom: 24px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(5, 10, 26, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .status {
      position: absolute;
      left: 24px;
      top: 24px;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      background: rgba(0,0,0,0.3);
      padding: 6px 10px;
      border-radius: 999px;
    }

    @media (max-width: 700px) {
      .caption { font-size: 0.8rem; left: 16px; bottom: 16px; }
      .status { left: 16px; top: 16px; }
    }
  </style>
</head>
<body>
  <div class="gallery-shell">
    <img id="imageMain" class="image" alt="SVG gallery image" />
    <img id="imageOverlay" class="image-overlay" alt="SVG gallery blend layer" />
    <div class="overlay"></div>
    <div id="status" class="status">Loading SVG gallery…</div>
    <div id="caption" class="caption"></div>
  </div>

  <script>
    const mainImage = document.getElementById('imageMain');
    const overlayImage = document.getElementById('imageOverlay');
    const caption = document.getElementById('caption');
    const status = document.getElementById('status');

    const blendModes = [
      'screen',
      'multiply',
      'overlay',
      'soft-light',
      'difference',
      'color-dodge',
      'color-burn',
      'luminosity'
    ];

    let images = [];
    let currentIndex = 0;
    let intervalId = null;

    async function loadImages() {
      try {
        const response = await fetch('list-svg.php', { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load SVG list');
        const data = await response.json();
        images = Array.isArray(data) ? data.filter((name) => /\.svg$/i.test(name)).sort() : [];

        if (!images.length) {
          status.textContent = 'No SVG files found';
          caption.textContent = 'Add SVG_image_01.svg and more to this folder';
          return;
        }

        status.textContent = `${images.length} SVG files detected`;
        showImage(0);
        intervalId = setInterval(() => showImage((currentIndex + 1) % images.length), 2000);
      } catch (error) {
        status.textContent = 'Gallery error';
        caption.textContent = 'Please open through your local web server';
        console.error(error);
      }
    }

    function showImage(index) {
      currentIndex = index;
      const file = images[currentIndex];
      const mainBlend = blendModes[currentIndex % blendModes.length];
      const overlayBlend = blendModes[(currentIndex + 1) % blendModes.length];

      mainImage.src = file;
      overlayImage.src = file;
      mainImage.style.mixBlendMode = mainBlend;
      overlayImage.style.mixBlendMode = overlayBlend;
      caption.textContent = file.replace(/\.svg$/i, '');

      mainImage.classList.remove('active');
      overlayImage.classList.remove('active');
      void mainImage.offsetWidth;
      mainImage.classList.add('active');
      overlayImage.classList.add('active');
    }

    loadImages();
  </script>
</body>
</html>
